version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 373313242633.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t brain-app .
      - docker tag brain-app:latest 373313242633.dkr.ecr.ap-south-1.amazonaws.com/brain-app:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 373313242633.dkr.ecr.ap-south-1.amazonaws.com/brain-app:latest

      - echo Installing kubectl
      - curl -o kubectl https://amazon-eks.s3.ap-south-1.amazonaws.com/1.34.0/2024-01-04/bin/linux/amd64/kubectl
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl

      - echo Updating kubeconfig
      - aws eks update-kubeconfig --region ap-south-1 --name brain-cluster

      - echo Deploying to EKS
      - kubectl apply -f deployment.yaml
      - kubectl apply -f service.yaml
